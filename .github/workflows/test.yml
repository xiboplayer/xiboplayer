name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * *'  # nightly at 03:17 UTC
  workflow_dispatch:

jobs:
  unit:
    uses: xiboplayer/.github/.github/workflows/test.yml@5c3b3699cd05c12bb3ec76e5d1d317d539dd69b4  # main
    with:
      lint-command: 'pnpm lint'
      typecheck: true

  integration:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: unit
    uses: xiboplayer/.github/.github/workflows/integration-test.yml@46da335eed4b80fcc1bb8015686152b4290f7617  # main
    with:
      cms-url: 'https://xibo-dev.superpantalles.com'
    secrets:
      CMS_CLIENT_ID: ${{ secrets.CMS_CLIENT_ID }}
      CMS_CLIENT_SECRET: ${{ secrets.CMS_CLIENT_SECRET }}
