name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# `contents: write` is needed by the release job below (gh release create).
# `id-token: write` is required for npm trusted publishing (OIDC exchange
# handled by the shared publish-npm.yml workflow).
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    uses: xiboplayer/.github/.github/workflows/publish-npm.yml@5c3b3699cd05c12bb3ec76e5d1d317d539dd69b4  # main
    with:
      publish-command: 'pnpm --filter @xiboplayer/pwa build && pnpm -r publish --no-git-checks --access public'

  # Create a GitHub Release for every tagged SDK bump. Needed so
  # `list_releases` and other tooling can see the SDK's published
  # versions — npm alone doesn't surface in the GH UI / API.
  release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    uses: xiboplayer/.github/.github/workflows/create-release.yml@5c3b3699cd05c12bb3ec76e5d1d317d539dd69b4  # main
    with:
      package-name: 'xiboplayer-sdk'
      description: 'xiboplayer SDK monorepo — @xiboplayer/* npm packages published together at matching versions.'
      install-url: 'https://www.npmjs.com/org/xiboplayer'
      install-snippet: |
        All `@xiboplayer/*` packages are published at the same version. Install any of them with:

        ```bash
        # pnpm
        pnpm add @xiboplayer/pwa

        # npm
        npm install @xiboplayer/pwa
        ```

        Full list: `@xiboplayer/{core,cache,proxy,renderer,stats,utils,pwa,xmds,xmr,sw,settings,sync,schedule,layout-runtime,timeline,widget-host}`.

  # Generate a CycloneDX SBOM for the tagged release and attach it to the
  # GitHub Release. Framed as "software inventory for transparency", not
  # a CRA compliance claim (see xiboplayer-compliance/cra/ RFC-0001).
  # Downstream commercial redistributors need it for their own work.
  sbom:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: xiboplayer-sdk-sbom.cdx.json

      - name: Upload SBOM to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" xiboplayer-sdk-sbom.cdx.json --clobber

  dispatch-www:
    name: Trigger xiboplayer-www regeneration
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to xiboplayer-www
        env:
          GH_TOKEN: ${{ secrets.WWW_DISPATCH_TOKEN }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::WWW_DISPATCH_TOKEN not set — skipping www regen trigger."
            exit 0
          fi
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER=$(npm view @xiboplayer/pwa version 2>/dev/null || echo 'unknown')
          fi
          echo "Firing repository_dispatch sdk-published to xiboplayer-www with version=$VER"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/xibo-players/xiboplayer-www/dispatches \
            -f event_type=sdk-published \
            -f "client_payload[version]=${VER}" \
            -f "client_payload[source]=xiboplayer-sdk" \
            -f "client_payload[tag]=${GITHUB_REF}"
          echo "Dispatch fired"
